<svg width="800" height="160" viewBox="0 0 800 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text-title {
      font-family: 'Sora', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 38px;
      fill: url(#headerGrad);
      filter: drop-shadow(0px 8px 16px rgba(0, 110, 32, 0.3));
      letter-spacing: 0.08em;
    }
    .text-subtitle {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 600;
      font-size: 13px;
      fill: #ffffff;
      opacity: 0.65;
      letter-spacing: 0.16em;
    }
    .glow-blob {
      animation: floatBlob 7s ease-in-out infinite alternate;
    }
    @keyframes floatBlob {
      0% { transform: translate(0px, 0px) scale(1); filter: blur(35px); opacity: 0.35; }
      100% { transform: translate(30px, -15px) scale(1.18); filter: blur(45px); opacity: 0.6; }
    }
  </style>
  <rect width="800" height="160" fill="#070d08" rx="16" />
  
  <!-- Background Blur Decorative Blobs -->
  <circle class="glow-blob" cx="190" cy="80" r="75" fill="#98ff98" />
  <circle class="glow-blob" cx="610" cy="90" r="65" fill="#006e20" style="animation-delay: -3.5s;" />
  
  <!-- Custom Pixel Grid Reticle for AI Super-Resolution -->
    <path d="M 30 30 L 70 30 M 30 30 L 30 70 M 770 30 L 730 30 M 770 30 L 770 70 M 30 130 L 70 130 M 30 130 L 30 90 M 770 130 L 730 130 M 770 130 L 770 90" stroke="rgba(0,110,32,0.2)" stroke-width="2" fill="none" />
    <line x1="400" y1="10" x2="400" y2="150" stroke="rgba(0,110,32,0.06)" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="50" y1="80" x2="750" y2="80" stroke="rgba(0,110,32,0.06)" stroke-width="1" stroke-dasharray="4 4" />
    <circle cx="400" cy="80" r="30" stroke="rgba(152,255,152,0.12)" stroke-width="1.5" fill="none" />
    <circle cx="400" cy="80" r="4" fill="#98ff98" opacity="0.4" />
  
  <!-- Title Text -->
  <text x="50%" y="78" dominant-baseline="middle" text-anchor="middle" class="text-title">U P S C A L E F O R G E</text>
  <text x="50%" y="122" dominant-baseline="middle" text-anchor="middle" class="text-subtitle">AI-POWERED IMAGE & VIDEO SUPER-RESOLUTION</text>
  
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#006e20" />
      <stop offset="50%" stop-color="#98ff98" />
      <stop offset="100%" stop-color="#006e20" />
    </linearGradient>
  </defs>
</svg>